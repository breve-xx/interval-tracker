<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interval Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app-container">
    <h1>Interval Tracker</h1>

    <section id="input-section">
      <label for="occurrence-input">Paste occurrences (one per line, or comma/semicolon separated):</label>
      <textarea
        id="occurrence-input"
        placeholder="e.g.&#10;2024-03-15 14:30:00&#10;2024-04-02T09:15:00&#10;15/05/2024 18:00"
        spellcheck="false"
      ></textarea>
      <button id="submit-occurrences" type="button">Add Occurrences</button>
      <p id="input-feedback" role="status" aria-live="polite"></p>
      <div class="import-row">
        <label for="import-file-input" class="import-label">Or load a saved session:</label>
        <input type="file" id="import-file-input" accept=".json,application/json" />
      </div>
      <p id="import-feedback" role="status" aria-live="polite"></p>
    </section>

    <section id="single-add-section" class="hidden">
      <label for="single-occurrence-input">Add next occurrence:</label>
      <div class="single-add-row">
        <input
          type="text"
          id="single-occurrence-input"
          placeholder="e.g. 2024-05-10 14:30:00"
          spellcheck="false"
        />
        <button id="add-single-btn" type="button">Add</button>
      </div>
      <p id="single-add-feedback" role="status" aria-live="polite"></p>
    </section>

    <section id="occurrences-section" class="hidden">
      <details id="occurrences-details" open>
        <summary id="occurrences-summary"><h2>Recorded Occurrences</h2></summary>
        <ol id="occurrence-list"></ol>
        <div class="session-actions">
          <button id="new-session-btn" type="button">New Session</button>
          <button id="export-session-btn" type="button">Export Session</button>
        </div>
      </details>
    </section>

    <section id="statistics-section" class="hidden">
      <h2>Statistics</h2>
      <div id="statistics-output"></div>
    </section>

    <section id="prediction-section" class="hidden">
      <h2>Next Occurrence Prediction</h2>
      <div id="prediction-output"></div>
    </section>
  </div>
  <script type="module" src="js/script.js"></script>
</body>
</html>
